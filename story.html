<!DOCTYPE html>
<html>
<head>
<title>Story 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial;
  text-align: center;
  color: yellow;

  background-image: url("image6.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
</style>
</head>

<body>

<h1>A Message For You 🌹</h1>

<p>You are very special to me yk?</p>
<p>im so muchh lucky to have a girl like you</p>

<a href="photos.html">
  <button>Tap hereee 💆🏻‍♂️</button>
</a>
<script>
function startEffects() {

  // 🎊 Confetti
  setInterval(() => {
    let c = document.createElement("div");
    c.innerHTML = ["🎉","🎊","✨"][Math.floor(Math.random()*3)];
    c.style.position = "fixed";
    c.style.left = Math.random() * 100 + "vw";
    c.style.top = "-10px";
    c.style.fontSize = "20px";
    c.style.zIndex = "9999";
    c.style.animation = "fall 4s linear";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }, 200);

  // 💖 Heart rain
  setInterval(() => {
    let h = document.createElement("div");
    h.innerHTML = "💖";
    h.style.position = "fixed";
    h.style.left = Math.random() * 100 + "vw";
    h.style.top = "-10px";
    h.style.fontSize = "18px";
    h.style.zIndex = "9999";
    h.style.animation = "fall 5s linear";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
  }, 250);

}

startEffects();
</script>

<style>
@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
</style>
</body>
</html>
