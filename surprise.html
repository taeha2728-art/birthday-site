<!DOCTYPE html>
<html>
<head>
<title>Somethings that you should know</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial;
  text-align: center;
  color: white;

  background-image: url("image8.png");
  background-size: cover;
  background-position: center;
}
</style>
</head>

<body>
  <div style="text-align:center; margin-top:30px;">

<button onclick="startSurprise()" style="
  width: 80%;
  max-width: 300px;
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  background: hotpink;
  color: white;
  border: none;
">
tap it after reading 🙇🏻‍♂️
</button>

<p id="loveMsg" style="display:none; font-size:18px; margin-top:15px;">
💖 You are special 💖
</p>

<audio id="bgmusic">
  <source src="song.mp3" type="audio/mpeg">
</audio>

  </div>

<h1>🎁 SURPRISE 🎉</h1>

<p>💖 You are amazing 💖</p>
<h2>🎂 HAPPY BIRTHDAY 🎂</h2>

<a href="index.html">
  <button>Go Home 🏠</button>
</a>
<script>
function startEffects() {

  // 🎊 Confetti
  setInterval(() => {
    let c = document.createElement("div");
    c.innerHTML = ["🎉","🎊","✨"][Math.floor(Math.random()*3)];
    c.style.position = "fixed";
    c.style.left = Math.random() * 100 + "vw";
    c.style.top = "-10px";
    c.style.fontSize = "20px";
    c.style.zIndex = "9999";
    c.style.animation = "fall 4s linear";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }, 200);

  // 💖 Heart rain
  setInterval(() => {
    let h = document.createElement("div");
    h.innerHTML = "💖";
    h.style.position = "fixed";
    h.style.left = Math.random() * 100 + "vw";
    h.style.top = "-10px";
    h.style.fontSize = "18px";
    h.style.zIndex = "9999";
    h.style.animation = "fall 5s linear";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
  }, 250);

}

startEffects();
</script>

<style>
@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
</style>
<script>
function startSurprise() {
  // 💖 show message
  document.getElementById("loveMsg").style.display = "block";

  // 🎵 play music
  let music = document.getElementById("bgmusic");
  music.play();
}
</script>
</body>
</html>
