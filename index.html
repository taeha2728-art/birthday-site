<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 🎉</title>

  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: Arial;
      background: linear-gradient(45deg, pink, violet, lightblue);
      background-size: 300% 300%;
      animation: bg 6s infinite;
      color: white;
      overflow: hidden;
    }

    @keyframes bg {
      0% {background-position: 0%;}
      50% {background-position: 100%;}
      100% {background-position: 0%;}
    }

    h1 {
      margin-top: 80px;
      font-size: 40px;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%, 100% {transform: translateY(0);}
      50% {transform: translateY(-20px);}
    }

    p {
      font-size: 20px;
    }

    .balloon {
      width: 40px;
      height: 60px;
      background: red;
      border-radius: 50%;
      position: absolute;
      bottom: -100px;
      animation: float 8s infinite;
    }

    @keyframes float {
      0% {transform: translateY(0);}
      100% {transform: translateY(-120vh);}
    }
  </style>
</head>

<body>

  <h1>🎉 Happy Birthday! 🎂</h1>
  <p>Wishing you joy, love & happiness 💖</p>

  <img src="birthday.jpg" width="200" style="border-radius:20px; margin-top:20px;">

  <!-- Balloons -->
  <div class="balloon" style="left:10%; background:red;"></div>
  <div class="balloon" style="left:30%; background:blue; animation-delay:2s;"></div>
  <div class="balloon" style="left:60%; background:yellow; animation-delay:4s;"></div>
  <div class="balloon" style="left:80%; background:green; animation-delay:1s;"></div>

</body>
</html>
