<!DOCTYPE html>
<html>
<head>
<head>

<title>Birthday 🎂</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial;
  text-align: center;
  color: black;

  background-image: url("image3.png"); /* your image */
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* optional animation (only if using gradient instead) */
@keyframes bg {
  0% {background-position: 0%;}
  50% {background-position: 100%;}
  100% {background-position: 0%;}
}

button {
  margin-top: 20px;
  padding: 12px;
  width: 80%;
  max-width: 300px;
  border-radius: 10px;
  border: none;
}
</style>

</head>
</head>

<body>
<button onclick="startSite()" id="enterBtn">
  For My Love 😋
</button>
<audio id="bgmusic" loop>
  <source src="sing.mp3" type="audio/mpeg">
</audio>
<h1>Happyy Birthdayy My Babyyy🌺</h1>
<p>Do You Like It??</p>

<button onclick="location.href='story.html'">Now tap heree 🤍</button>

<script>
setInterval(()=>{
let e=document.createElement("div");
e.innerHTML=["💖","🎉","✨"][Math.floor(Math.random()*3)];
e.style.position="fixed";
e.style.left=Math.random()*100+"vw";
e.style.top="-10px";
e.style.animation="fall 4s linear";
document.body.appendChild(e);
setTimeout(()=>e.remove(),4000);
},200);
</script>

<style>
@keyframes fall{to{transform:translateY(100vh);}}
</style>
<script>
function startSite() {
  document.getElementById("bgmusic").play();
  document.getElementById("enterBtn").style.display = "none";
}
</script>
</body>
</html>
