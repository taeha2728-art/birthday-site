<!DOCTYPE html>
<html>
<head>
  <title>Photos 📸</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: lavender;
      padding: 20px;
    }

    img {
      width: 90%;
      max-width: 300px;
      border-radius: 15px;
      margin: 10px;
    }

    button {
      width: 80%;
      max-width: 300px;
      padding: 12px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <h2>💌 A Special Message For You</h2>

<p id="typing" style="font-size:18px; color:#ff4d6d;"></p>

<h1>📸 Memories</h1>

<img src="photo1.jpg">
<img src="photo2.jpg">

<br>

<a href="surprise.html">
  <button>Final Surprise 🎁</button>
</a>
<script>
function startEffects() {

  // 🎊 Confetti
  setInterval(() => {
    let c = document.createElement("div");
    c.innerHTML = ["🎉","🎊","✨"][Math.floor(Math.random()*3)];
    c.style.position = "fixed";
    c.style.left = Math.random() * 100 + "vw";
    c.style.top = "-10px";
    c.style.fontSize = "20px";
    c.style.zIndex = "9999";
    c.style.animation = "fall 4s linear";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }, 200);

  // 💖 Heart rain
  setInterval(() => {
    let h = document.createElement("div");
    h.innerHTML = "💖";
    h.style.position = "fixed";
    h.style.left = Math.random() * 100 + "vw";
    h.style.top = "-10px";
    h.style.fontSize = "18px";
    h.style.zIndex = "9999";
    h.style.animation = "fall 5s linear";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
  }, 250);

}

startEffects();
</script>

<style>
@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
</style>
  <script>
let text = "💖 You are truly special... I’m lucky to know you... Happy Birthday! 🎂💖";
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 80); // speed (lower = faster)
  }
}

typeWriter();
  </script>
</body>
</html>
